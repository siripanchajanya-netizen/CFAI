<!DOCTYPE html>
<html>
<head>
    <title>University Timetable Generator</title>

    <style>

    body{
        margin:0;
        font-family:Arial;
        background:linear-gradient(135deg,#667eea,#764ba2);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .box{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        width:400px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
        color:#333;
    }

    input{
        width:90%;
        padding:12px;
        margin:10px;
        border-radius:10px;
        border:1px solid gray;
    }

    button{
        background:#667eea;
        color:white;
        border:none;
        padding:12px 25px;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#4d5fd4;
    }

    </style>

</head>
<body>

<div class="box">

    <h1>University Timetable Generator</h1>

    <input type="text" placeholder="Enter Username">

    <input type="password" placeholder="Enter Password">

    <br><br>

    <a href="/timetable">
        <button>Login</button>
    </a>

</div>

</body>
</html>
